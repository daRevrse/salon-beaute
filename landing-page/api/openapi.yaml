openapi: "3.0.3"

info:
  title: SalonHub API
  version: "1.0.0"
  description: |
    SalonHub is a multi-tenant SaaS platform designed for beauty salons, restaurants,
    training centers, and medical practices. The API provides comprehensive management
    of appointments, clients, services, staff, settings, and public booking flows.

    ## Authentication

    The API supports two authentication methods:

    - **JWT Bearer Token** -- Obtained via `/auth/login` or `/auth/register`. Include as `Authorization: Bearer <token>`.
    - **API Key** -- Prefixed with `sk_live_`. Include as `Authorization: Bearer sk_live_...`. API keys are scoped and can be managed via the `/api-keys` endpoints.

    ## Multi-Tenancy

    Most endpoints require tenant context. The tenant is resolved automatically from the
    authenticated user's JWT token. Public endpoints use the tenant slug in the URL path.

    ## Error Handling

    All error responses follow a consistent format:
    ```json
    {
      "success": false,
      "error": "ERROR_CODE",
      "message": "Human-readable description"
    }
    ```
  contact:
    name: SalonHub Support
    email: support@salonhub.app
    url: https://salonhub.app
  license:
    name: Proprietary
    url: https://salonhub.app/terms

servers:
  - url: https://api.salonhub.app/api
    description: Production server

tags:
  - name: Authentication
    description: User registration, login, profile, and staff management
  - name: Clients
    description: Client management and history
  - name: Services
    description: Service catalog management
  - name: Appointments
    description: Appointment scheduling and management
  - name: Public Booking
    description: Public-facing endpoints for online booking (no auth required)
  - name: Settings
    description: Salon settings and subscription management
  - name: API Keys
    description: API key management for developer integrations

security:
  - BearerAuth: []

paths:
  # ──────────────────────────────────────────────
  # AUTH ROUTES
  # ──────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new salon and owner account
      description: Creates a new tenant (salon) and the owner user account. Returns a JWT token for immediate authentication.
      operationId: registerSalon
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              salon_name: "Belle Coiffure"
              salon_email: "contact@bellecoiffure.fr"
              salon_phone: "+33612345678"
              salon_address: "12 Rue de la Paix"
              salon_city: "Paris"
              salon_postal_code: "75002"
              first_name: "Marie"
              last_name: "Dupont"
              email: "marie@bellecoiffure.fr"
              password: "securepass123"
              subscription_plan: "essential"
              business_type: "beauty"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              example:
                success: true
                token: "eyJhbGciOiJIUzI1NiIs..."
                user:
                  id: 1
                  email: "marie@bellecoiffure.fr"
                  first_name: "Marie"
                  last_name: "Dupont"
                  role: "owner"
                tenant:
                  id: 1
                  name: "Belle Coiffure"
                  slug: "belle-coiffure"
                  business_type: "beauty"
                  subscription_status: "trialing"
                  subscription_plan: "essential"
                  trial_ends_at: "2026-04-01T00:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email or salon already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                success: false
                error: "CONFLICT"
                message: "A user with this email already exists"

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login with email and password
      description: Authenticates a user and returns a JWT token along with user and tenant details.
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: "marie@bellecoiffure.fr"
              password: "securepass123"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              example:
                success: true
                token: "eyJhbGciOiJIUzI1NiIs..."
                user:
                  id: 1
                  email: "marie@bellecoiffure.fr"
                  first_name: "Marie"
                  last_name: "Dupont"
                  role: "owner"
                  tenant_id: 1
                  avatar_url: "https://cdn.salonhub.app/avatars/1.jpg"
                tenant:
                  id: 1
                  name: "Belle Coiffure"
                  slug: "belle-coiffure"
                  subscription_status: "active"
                  subscription_plan: "essential"
                  trial_ends_at: null
                  logo_url: "https://cdn.salonhub.app/logos/1.png"
                  business_type: "beauty"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                success: false
                error: "UNAUTHORIZED"
                message: "Invalid email or password"

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user profile
      description: Returns the authenticated user's profile along with tenant information.
      operationId: getCurrentUser
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    $ref: "#/components/schemas/UserWithTenant"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/password:
    put:
      tags: [Authentication]
      summary: Change password
      description: Updates the authenticated user's password. Requires current password verification.
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  example: "oldpassword123"
                new_password:
                  type: string
                  minLength: 6
                  example: "newpassword456"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Password updated successfully"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/staff:
    get:
      tags: [Authentication]
      summary: List all staff members
      description: Returns all staff members for the current tenant. Requires owner or admin role.
      operationId: listStaff
      responses:
        "200":
          description: Staff list retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
              example:
                success: true
                data:
                  - id: 2
                    email: "sophie@bellecoiffure.fr"
                    first_name: "Sophie"
                    last_name: "Martin"
                    phone: "+33698765432"
                    role: "staff"
                    is_active: true
                    avatar_url: null
                    created_at: "2026-01-15T10:30:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Authentication]
      summary: Create a staff member
      description: Creates a new staff member for the current tenant. Requires owner or admin role.
      operationId: createStaff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
            example:
              email: "sophie@bellecoiffure.fr"
              password: "staffpass123"
              first_name: "Sophie"
              last_name: "Martin"
              phone: "+33698765432"
              role: "staff"
      responses:
        "201":
          description: Staff member created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/staff/{id}:
    put:
      tags: [Authentication]
      summary: Update a staff member
      description: Updates a staff member's details. Requires owner or admin role.
      operationId: updateStaff
      parameters:
        - $ref: "#/components/parameters/StaffId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffRequest"
            example:
              first_name: "Sophie"
              last_name: "Martin-Leroy"
              phone: "+33698765432"
              role: "admin"
              is_active: true
      responses:
        "200":
          description: Staff member updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Authentication]
      summary: Delete a staff member
      description: Deletes a staff member from the current tenant. Requires owner or admin role.
      operationId: deleteStaff
      parameters:
        - $ref: "#/components/parameters/StaffId"
      responses:
        "200":
          description: Staff member deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Staff member deleted successfully"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/profile:
    get:
      tags: [Authentication]
      summary: Get user profile
      description: Returns the authenticated user's profile within the current tenant context.
      operationId: getUserProfile
      responses:
        "200":
          description: Profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Authentication]
      summary: Update user profile
      description: Updates the authenticated user's profile within the current tenant context.
      operationId: updateUserProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
            example:
              first_name: "Marie"
              last_name: "Dupont-Leroy"
              phone: "+33612345678"
              email: "marie@bellecoiffure.fr"
              avatar_url: "https://cdn.salonhub.app/avatars/1-new.jpg"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  # CLIENT ROUTES
  # ──────────────────────────────────────────────
  /clients:
    get:
      tags: [Clients]
      summary: List clients
      description: Returns a paginated list of clients for the current tenant. Supports search filtering.
      operationId: listClients
      parameters:
        - name: search
          in: query
          description: Search by name, email, or phone
          schema:
            type: string
            example: "dupont"
        - name: limit
          in: query
          description: Number of results per page
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
            example: 50
        - name: offset
          in: query
          description: Offset for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
            example: 0
      responses:
        "200":
          description: Client list retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Client"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Clients]
      summary: Create a client
      description: Creates a new client for the current tenant.
      operationId: createClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
            example:
              first_name: "Jean"
              last_name: "Martin"
              email: "jean.martin@email.com"
              phone: "+33612340000"
              date_of_birth: "1990-05-15"
              gender: "male"
              notes: "Prefers morning appointments"
              email_marketing_consent: true
              sms_marketing_consent: false
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Client"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /clients/{id}:
    get:
      tags: [Clients]
      summary: Get a client by ID
      description: Returns detailed client information including appointment stats.
      operationId: getClient
      parameters:
        - $ref: "#/components/parameters/ClientId"
      responses:
        "200":
          description: Client retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Client"
                      - type: object
                        properties:
                          stats:
                            $ref: "#/components/schemas/ClientStats"
              example:
                success: true
                data:
                  id: 10
                  first_name: "Jean"
                  last_name: "Martin"
                  email: "jean.martin@email.com"
                  phone: "+33612340000"
                  date_of_birth: "1990-05-15"
                  gender: "male"
                  notes: "Prefers morning appointments"
                  email_marketing_consent: true
                  sms_marketing_consent: false
                  created_at: "2026-01-10T09:00:00.000Z"
                  updated_at: "2026-02-20T14:30:00.000Z"
                  stats:
                    total_appointments: 12
                    total_spent: 540.00
                    last_visit_date: "2026-02-18"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Clients]
      summary: Update a client
      description: Updates an existing client's information.
      operationId: updateClient
      parameters:
        - $ref: "#/components/parameters/ClientId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
            example:
              phone: "+33698760000"
              notes: "Prefers morning appointments. Allergic to certain products."
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Client"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Clients]
      summary: Delete a client
      description: Deletes a client. Fails if the client has future appointments.
      operationId: deleteClient
      parameters:
        - $ref: "#/components/parameters/ClientId"
      responses:
        "200":
          description: Client deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Client deleted successfully"
        "400":
          description: Client has future appointments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                success: false
                error: "BAD_REQUEST"
                message: "Cannot delete client with future appointments"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /clients/{id}/appointments:
    get:
      tags: [Clients]
      summary: Get client appointment history
      description: Returns the appointment history for a specific client.
      operationId: getClientAppointments
      parameters:
        - $ref: "#/components/parameters/ClientId"
      responses:
        "200":
          description: Appointment history retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────
  # SERVICE ROUTES
  # ──────────────────────────────────────────────
  /services:
    get:
      tags: [Services]
      summary: List services
      description: Returns services for the current tenant. Supports filtering and returns both a flat list and grouped by category.
      operationId: listServices
      parameters:
        - name: category
          in: query
          description: Filter by category name
          schema:
            type: string
            example: "Coiffure"
        - name: is_active
          in: query
          description: Filter by active status
          schema:
            type: boolean
            example: true
        - name: search
          in: query
          description: Search by service name
          schema:
            type: string
            example: "coupe"
      responses:
        "200":
          description: Services retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Service"
                  grouped:
                    type: object
                    description: Services grouped by category
                    additionalProperties:
                      type: array
                      items:
                        $ref: "#/components/schemas/Service"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Services]
      summary: Create a service
      description: Creates a new service for the current tenant.
      operationId: createService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
            example:
              name: "Coupe Femme"
              duration: 45
              price: 35.00
              description: "Coupe, shampoing et brushing"
              slot_duration: 60
              category: "Coiffure"
              is_active: true
              requires_deposit: false
              deposit_amount: null
              available_for_online_booking: true
              image_url: "https://cdn.salonhub.app/services/coupe-femme.jpg"
              gallery: []
      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Service"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /services/{id}:
    get:
      tags: [Services]
      summary: Get a service by ID
      description: Returns detailed service information including usage stats.
      operationId: getService
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: Service retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Service"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Services]
      summary: Update a service
      description: Updates an existing service.
      operationId: updateService
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceRequest"
            example:
              price: 40.00
              duration: 50
      responses:
        "200":
          description: Service updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Service"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Services]
      summary: Delete a service
      description: Permanently deletes a service.
      operationId: deleteService
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: Service deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Service deleted successfully"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /services/{id}/toggle:
    patch:
      tags: [Services]
      summary: Toggle service active status
      description: Toggles the is_active flag on a service.
      operationId: toggleService
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: Service toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Service"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /services/meta/categories:
    get:
      tags: [Services]
      summary: List service categories
      description: Returns all service categories with their service count.
      operationId: listServiceCategories
      responses:
        "200":
          description: Categories retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        category:
                          type: string
                          example: "Coiffure"
                        count:
                          type: integer
                          example: 8
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  # APPOINTMENT ROUTES
  # ──────────────────────────────────────────────
  /appointments:
    get:
      tags: [Appointments]
      summary: List appointments
      description: Returns a paginated list of appointments with full join data (client, service, staff). Supports date range and status filtering.
      operationId: listAppointments
      parameters:
        - name: date
          in: query
          description: Filter by exact date (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2026-03-15"
        - name: start_date
          in: query
          description: Filter from this date (inclusive)
          schema:
            type: string
            format: date
            example: "2026-03-01"
        - name: end_date
          in: query
          description: Filter until this date (inclusive)
          schema:
            type: string
            format: date
            example: "2026-03-31"
        - name: status
          in: query
          description: Filter by appointment status
          schema:
            type: string
            enum: [pending, confirmed, cancelled, completed, no_show]
            example: "confirmed"
        - name: client_id
          in: query
          description: Filter by client ID
          schema:
            type: integer
            example: 10
        - name: staff_id
          in: query
          description: Filter by staff member ID
          schema:
            type: integer
            example: 2
        - name: limit
          in: query
          description: Number of results per page
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
            example: 100
        - name: offset
          in: query
          description: Offset for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
            example: 0
      responses:
        "200":
          description: Appointments retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Appointment"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Appointments]
      summary: Create an appointment
      description: Creates a new appointment for the current tenant.
      operationId: createAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentRequest"
            example:
              client_id: 10
              service_id: 5
              appointment_date: "2026-03-20"
              start_time: "10:00"
              end_time: "10:45"
              staff_id: 2
              notes: "First-time client"
              client_notes: ""
              booked_by: "staff"
              booking_source: "dashboard"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Appointment"
        "400":
